name: temporal-rag

# One-command startup:
#   docker compose up --build
# Then open http://localhost:8000 (app) and http://localhost:8233 (Temporal UI).
#
# Ollama runs on the HOST by default (reached via host.docker.internal), so it
# uses your existing GPU-accelerated instance. For a fully self-contained run
# with Ollama in a container, add an .env line `OLLAMA_HOST=http://ollama:11434`
# and start with:  docker compose --profile ollama up --build

x-app-env: &app-env
  TEMPORAL_SERVER: temporal:7233
  QDRANT_HOST: qdrant
  QDRANT_PORT: "6333"
  QDRANT_COLLECTION: documents
  OLLAMA_MODEL: qwen2.5:3b
  OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}

services:
  temporal:
    image: temporalio/temporal:latest
    # In-memory dev server: Temporal history is ephemeral across restarts, which
    # is fine here — the durable knowledge base lives in Qdrant. Avoids SQLite
    # volume-permission issues and keeps startup a single container.
    command: server start-dev --ip 0.0.0.0
    ports:
      - "7233:7233"   # gRPC (workflow client)
      - "8233:8233"   # Web UI
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health", "--address", "localhost:7233"]
      interval: 5s
      timeout: 5s
      retries: 30

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage

  worker:
    build: .
    command: python worker.py
    environment: *app-env
    depends_on:
      temporal:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./documents:/app/documents   # shared with api so uploaded PDFs are readable

  api:
    build: .
    command: python run_api.py
    ports:
      - "8000:8000"
    environment: *app-env
    depends_on:
      temporal:
        condition: service_healthy
      worker:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./documents:/app/documents

  # ----- optional: fully containerized Ollama (docker compose --profile ollama up) -----
  ollama:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 5s
      retries: 30

  ollama-pull:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["sh", "-c", "ollama pull qwen2.5:3b"]
    restart: "no"

volumes:
  qdrant-data:
  ollama-data:
